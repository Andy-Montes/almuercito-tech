<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-display:'Space Grotesk','Atkinson Hyperlegible',system-ui,sans-serif;
  --font-body:'Atkinson Hyperlegible',system-ui,sans-serif;
  --m:#FF1493;--ye:#FFD60A;--gr:#A8FF00;--or:#FF3B00;--pu:#BF00FF;--cy:#00F0FF;
}
body{font-family:var(--font-body);font-size:17px;line-height:1.55;transition:background .2s,color .2s;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body.dark{--bg:#0a0a0a;--bg2:#161616;--bg3:#1e1e1e;--border:#252525;--border2:#333;--text:#f0f0f0;--text2:#888;--text3:#bbb;--input:#161616}
body.light{--bg:#f5f4f0;--bg2:#eeecea;--bg3:#fff;--border:#d8d6d2;--border2:#bbb;--text:#111;--text2:#555;--text3:#333;--input:#fff}
body{background:var(--bg);color:var(--text)}
.display{font-family:var(--font-display);letter-spacing:-0.02em;text-wrap:balance}
p,.body-pretty{text-wrap:pretty}

button{font-family:inherit;cursor:pointer;transition:all .15s}
input,select,textarea{font-family:inherit;background:var(--input);color:var(--text);border:2px solid var(--border2);border-radius:6px;padding:13px 16px;font-size:16px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--m)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.lbl{display:block;font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text)}
.ig{margin-bottom:16px}

.bp{background:var(--m);color:#fff;border:none;border-radius:7px;padding:14px 26px;font-size:15px;font-weight:600;min-height:48px;font-family:var(--font-display);letter-spacing:.005em;transition:filter .15s,transform .15s}
.bp:hover{filter:brightness(1.1)}
.bp:active{transform:scale(.97)}
.bs{background:transparent;color:var(--text);border:2px solid var(--border2);border-radius:7px;padding:12px 20px;font-size:14px;font-weight:600;min-height:48px;font-family:var(--font-display);letter-spacing:.005em;transition:border-color .15s,transform .15s}
.bs:hover{border-color:var(--m)}
.bs:active{transform:scale(.97)}
.bsm{padding:9px 16px;font-size:13px;min-height:40px}
.bd{background:transparent;color:#ff6b6b;border:2px solid var(--border2);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600;min-height:36px;font-family:var(--font-display);transition:border-color .15s,transform .15s,color .15s}
.bd:hover{border-color:#ff6b6b}
.bd:active{transform:scale(.95)}
button:focus-visible,.chk:focus-visible{outline:2px solid var(--m);outline-offset:2px;border-radius:7px}
.br{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}

/* PANTALLAS */
#scSelect{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px 20px}
#scSelect.on{display:flex}
#scApp{display:none;flex-direction:column;height:100vh;overflow:hidden}
#scApp.on{display:flex}

/* SELECCIÓN */
.pgrid{display:flex;flex-direction:column;gap:10px;width:100%;max-width:540px}
.pb{background:var(--bg2);border:2px solid var(--border2);border-radius:12px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;color:var(--text);width:100%;text-align:left;transition:transform .2s cubic-bezier(.34,1.3,.64,1),border-color .15s,box-shadow .2s}
.pb:hover{border-color:var(--m);transform:translateX(4px);box-shadow:-4px 4px 0 0 var(--m)}
.pb:active{transform:translateX(2px);box-shadow:-2px 2px 0 0 var(--m)}
.pav{width:52px;height:52px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;flex-shrink:0;color:#fff}
.pnm{font-family:var(--font-display);font-size:19px;font-weight:600;line-height:1.2;letter-spacing:-0.015em}
.pni{font-size:13px;color:var(--text3);margin-top:3px;font-weight:500}
.ppl{font-size:20px;margin-left:auto;flex-shrink:0}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.84);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center;z-index:400;padding:0}
.overlay.on{display:flex;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--bg);border:2px solid var(--border2);border-top:4px solid var(--m);border-radius:14px 14px 0 0;padding:28px 24px;width:100%;max-height:92vh;overflow-y:auto;animation:modalIn .28s cubic-bezier(.34,1.3,.64,1)}
@keyframes modalIn{from{transform:translateY(24px);opacity:.6}to{transform:translateY(0);opacity:1}}
@media(min-width:600px){.modal{border-radius:10px;width:460px;max-width:95vw}}
.modal-lg{width:100%}
@media(min-width:700px){.modal-lg{width:640px}}
.mt{font-family:var(--font-display);font-size:22px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px;line-height:1.2}
.ms{font-size:15px;color:var(--text2);margin-bottom:20px;line-height:1.55;text-wrap:pretty}

/* APP */
.hdr{border-bottom:2px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg);gap:10px}
@media(min-width:768px){.hdr{padding:14px 22px}}
.hdr-brand{font-family:var(--font-display);font-size:14px;font-weight:600;letter-spacing:-0.01em;white-space:nowrap;display:none}
@media(min-width:560px){.hdr-brand{display:inline}}
.hdr-swap{font-size:13px;color:var(--text2);transform:translateY(-1px)}
.dot{width:9px;height:9px;background:var(--m);border-radius:50%;box-shadow:0 0 10px var(--m);animation:pu 2s ease infinite;flex-shrink:0}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.25}}
.wrap{display:flex;flex:1;overflow:hidden}

/* SIDEBAR desktop */
.sb{display:none;flex-direction:column;width:250px;border-right:2px solid var(--border);overflow-y:auto;flex-shrink:0;padding:18px 0;background:var(--bg)}
@media(min-width:768px){.sb{display:flex}}
.sbl{font-family:var(--font-display);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--text2);padding:0 16px 10px}
.si{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;border-left:3px solid transparent;min-height:56px;transition:background .15s}
.si:hover{background:var(--bg2)}
.si.on{background:var(--bg2);border-left-color:var(--m)}
.sav{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff}
.snm{font-family:var(--font-display);font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-0.01em}
.sni{font-size:11px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.sdv{height:2px;background:var(--border);margin:12px 16px}
.snav{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text2);border-left:3px solid transparent;min-height:46px;display:flex;align-items:center;gap:8px;transition:all .15s}
.snav:hover{color:var(--text)}
.snav.on{color:var(--text);border-left-color:var(--ye);background:var(--bg2)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px 20px 88px;background:var(--bg)}
@media(min-width:768px){.main{padding:28px 32px 32px}}

/* BARRA MÓVIL */
.mobnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:2px solid var(--border);display:flex;z-index:300;height:62px}
@media(min-width:768px){.mobnav{display:none}}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;font-size:11px;font-weight:700;color:var(--text2);border:none;background:transparent;min-height:62px;padding:0;transition:color .15s}
.mnb.on{color:var(--m)}
.mnb span{font-size:20px;line-height:1}
.mobpeople{position:fixed;bottom:62px;left:0;right:0;background:var(--bg);border-top:2px solid var(--border);z-index:299;display:none;max-height:55vh;overflow-y:auto;padding:6px 0}
.mobpeople.on{display:block}

/* TOUR PANEL */
#tourPanel{position:fixed;bottom:78px;left:14px;right:14px;background:var(--bg);border:2px solid var(--m);border-radius:14px;padding:18px;z-index:450;box-shadow:0 12px 40px rgba(0,0,0,.25);display:none;max-width:480px;margin:0 auto}
#tourPanel.on{display:block;animation:tourIn .25s ease}
@keyframes tourIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:768px){#tourPanel{bottom:24px;left:24px;right:auto;max-width:420px}}
.tour-hl{position:relative;z-index:440;outline:3px solid var(--m);outline-offset:4px;border-radius:8px;animation:tourPulse 1.4s ease infinite}
@keyframes tourPulse{0%,100%{outline-color:var(--m)}50%{outline-color:transparent}}

/* BOTÓN AYUDA FLOTANTE */
#helpFab{position:fixed;right:18px;bottom:78px;width:52px;height:52px;border-radius:50%;background:var(--m);color:#fff;border:none;font-size:24px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(255,20,147,.45);z-index:250;display:flex;align-items:center;justify-content:center;transition:transform .15s}
#helpFab:hover{transform:scale(1.08)}
@media(min-width:768px){#helpFab{bottom:24px;right:24px;width:56px;height:56px;font-size:26px}}

/* CONTENIDO */
.sech{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.sech1{font-family:var(--font-display);font-size:30px;font-weight:600;line-height:1.05;letter-spacing:-0.025em;text-wrap:balance}
@media(min-width:600px){.sech1{font-size:38px}}
.eyebrow{font-family:var(--font-display);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--m);margin-bottom:8px}
.help{background:var(--bg2);border:2px solid var(--border);border-left:4px solid var(--ye);border-radius:6px;padding:14px 18px;margin-bottom:20px;font-size:15px;color:var(--text3);line-height:1.5}
.help strong{color:var(--text)}
.grid1{display:flex;flex-direction:column;gap:10px}
.row{background:var(--bg2);border:2px solid var(--border);border-radius:8px;padding:16px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:background .15s}
.chk{width:32px;height:32px;border-radius:7px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:17px;font-weight:700;transition:transform .2s cubic-bezier(.34,1.4,.64,1),background .15s,border-color .15s}
.chk:hover{transform:scale(1.08)}
.chk:active{transform:scale(.92)}
.prog-bg{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;width:100%}
.prog-fill{height:100%;background:var(--m);border-radius:3px;transition:width .3s}
.grid2{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:500px){.grid2{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}}
.card{background:var(--bg2);border:2px solid var(--border);border-radius:10px;padding:18px;transition:border-color .15s,transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s}
.card:hover{border-color:var(--m);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
body.dark .card:hover{box-shadow:0 8px 24px rgba(0,0,0,.4)}
.empty-state{background:var(--bg2);border:2px dashed var(--border2);border-radius:12px;padding:36px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-state .empty-icon{font-size:44px;line-height:1;margin-bottom:6px;filter:saturate(.85)}
.empty-state h4{font-family:var(--font-display);font-size:18px;font-weight:600;letter-spacing:-0.01em;color:var(--text)}
.empty-state p{font-size:14px;color:var(--text2);line-height:1.5;max-width:36ch;text-wrap:pretty}

/* PERFIL HERO */
.hero{background:var(--bg2);border:2px solid var(--border);border-top:4px solid var(--m);border-radius:10px;padding:20px;margin-bottom:20px}
.hero-top{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.hero-av{width:60px;height:60px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;color:#fff}
.hero-name{font-family:var(--font-display);font-size:24px;font-weight:600;line-height:1.15;letter-spacing:-0.02em;margin-bottom:4px}
.hero-niche{font-size:14px;color:var(--text2);font-weight:500;margin-bottom:6px;letter-spacing:.01em}
.hero-bio{font-size:15px;color:var(--text3);line-height:1.6;text-wrap:pretty}
.badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:4px;display:inline-flex;align-items:center;gap:4px}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;gap:2px;mask-image:linear-gradient(to right,transparent 0,black 14px,black calc(100% - 28px),transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0,black 14px,black calc(100% - 28px),transparent 100%);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 18px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text2);border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s;flex-shrink:0;display:inline-flex;align-items:center;gap:6px;min-height:46px}
.tab.on{color:var(--text);border-bottom-color:var(--m)}
.tab:hover{color:var(--text)}

/* REACCIONES */
.react-btn{background:var(--bg);border:2px solid var(--border);border-radius:20px;padding:7px 13px;font-size:17px;cursor:pointer;min-height:40px;font-family:inherit;color:var(--text);transition:transform .18s cubic-bezier(.34,1.4,.64,1),background .15s,border-color .15s}
.react-btn:hover{border-color:var(--m);background:var(--bg3);transform:translateY(-1px)}
.react-btn.on{border-color:var(--m);background:var(--bg3)}
.react-btn:active{transform:scale(.92)}
.react-count{font-size:12px;font-weight:600;color:var(--text2);margin-left:3px;font-family:var(--font-display);font-variant-numeric:tabular-nums}

/* TOGGLE */
.theme-btn{background:var(--bg2);border:2px solid var(--border2);border-radius:20px;padding:9px 14px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;min-height:42px}
.theme-btn:hover{border-color:var(--m)}

/* NOTIF */
.notif{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(8px);background:#111;border:2px solid #A8FF00;border-radius:10px;padding:13px 20px;font-size:14px;font-weight:600;color:#fff;opacity:0;transition:opacity .25s cubic-bezier(.4,0,.2,1),transform .25s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:600;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.35);display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display);letter-spacing:.005em}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.notif.success{border-color:#A8FF00}
.notif.error{border-color:#ff6b6b}
.notif.loading{border-color:#888}
@media(min-width:768px){.notif{bottom:24px;right:24px;left:auto;transform:translateY(8px)}.notif.show{transform:translateY(0)}}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PLANT POP */
@keyframes plantPop{0%{transform:scale(1) rotate(0)}30%{transform:scale(1.4) rotate(-8deg)}55%{transform:scale(.92) rotate(6deg)}80%{transform:scale(1.08) rotate(-2deg)}100%{transform:scale(1) rotate(0)}}
.plant-emoji.celebrate{animation:plantPop .7s cubic-bezier(.34,1.4,.64,1)}
@keyframes ringOut{0%{transform:scale(.4);opacity:.8}100%{transform:scale(2.4);opacity:0}}
.celebrate-ring{position:absolute;inset:0;border-radius:50%;border:2px solid currentColor;pointer-events:none;animation:ringOut .7s ease-out forwards}

/* PLANTA */
.plant-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.plant-emoji{font-size:28px;line-height:1}
.plant-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);text-align:center}

/* PROYECTOS */
.proj-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px}

/* OVERVIEW REUNIÓN */
.ov-card{background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .15s,transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s}
.ov-card:hover{border-color:var(--m);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
body.dark .ov-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ov-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:500px){.ov-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}}
</style>
</head>
<body class="light">

<!-- SELECCIÓN -->
<div id="scSelect" class="on">
  <div style="text-align:center;max-width:540px;width:100%">
    <div style="font-family:var(--font-display);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.22em;color:var(--m);margin-bottom:12px">Almuercito Tech</div>
    <div style="font-family:var(--font-display);font-size:44px;font-weight:600;line-height:1.02;letter-spacing:-0.035em;text-wrap:balance">Elige tu nombre<span style="color:var(--m)">.</span></div>
    <div style="font-size:16px;color:var(--text2);margin-top:14px;text-wrap:pretty">Pincha tu tarjeta. Te pedirá tu PIN.</div>
  </div>
  <div class="pgrid" id="profGrid"></div>
  <button class="theme-btn" onclick="toggleTheme()">
    <span id="themeIcon">☀️</span><span id="themeLabel">Cambiar a claro</span>
  </button>
</div>

<!-- PIN -->
<div class="overlay" id="pinOv">
  <div class="modal" style="max-width:340px">
    <div class="mt">Escribe tu PIN</div>
    <div class="ms">Son 4 números. Solo tú editas tu perfil.</div>
    <div class="ig">
      <input type="password" inputmode="numeric" id="pinInp" maxlength="4" placeholder="• • • •"
        autocomplete="off" style="text-align:center;font-size:34px;letter-spacing:12px;font-weight:700;min-height:76px">
      <div id="pinErr" style="display:none;color:#ff6b6b;font-size:14px;font-weight:700;text-align:center;margin-top:10px">
        PIN incorrecto. Intenta de nuevo.
      </div>
    </div>
    <div class="br">
      <button class="bs" onclick="closePinModal()">Cancelar</button>
      <button class="bp" onclick="submitPin()">Entrar</button>
    </div>
  </div>
</div>

<!-- MODAL GENÉRICO -->
<div class="overlay" id="genOv" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="genModal"></div>
</div>

<!-- TOUR GUIADO (panel inferior) -->
<div id="tourPanel">
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
    <div id="tourEmoji" style="font-size:32px;flex-shrink:0">👋</div>
    <div style="flex:1;min-width:0">
      <div class="mt" id="tourTitle" style="font-size:17px;margin-bottom:2px"></div>
      <div style="display:flex;gap:4px" id="tourDots"></div>
    </div>

<script>
// ══════════════════════════════════════
// API
// ══════════════════════════════════════
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxE6hENKeKgyHIC-s48IQi2zvZEjdfhUh_eGiudFBGbDqmFbDg39Cmh8W5s5gjwYqZM/exec';
var myPin = null;

function apiGet(){
  return fetch(APPS_SCRIPT_URL, {method:'GET'})
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(!j.ok) throw new Error(j.error || 'Error al cargar datos');
      return j;
    });
}

function apiPost(action, payload){
  var body = Object.assign({action: action}, payload || {});
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(body),
    redirect: 'follow'
  })
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(!j.ok) throw new Error(j.error || 'Error');
      return j.result;
    });
}

// Convierte la data del servidor al shape que usa el frontend
function transformServerData(data, currentUserId){
  var byId = {};
  (data.students||[]).forEach(function(s){
    byId[s.id] = Object.assign({}, s, {weeks:{}, projects:[], achievements:[]});
  });
  (data.weeks||[]).forEach(function(w){
    var s = byId[w.student_id]; if(!s) return;
    var goals = [];
    try { goals = JSON.parse(w.goals_json || '[]') || []; } catch(e){}
    s.weeks[w.week_key] = {goals: goals, review: w.review || '', created: w.week_key};
  });
  (data.projects||[]).forEach(function(p){
    var s = byId[p.student_id]; if(!s) return;
    s.projects.push({name:p.name, desc:p.desc, status:p.status||'activo'});
  });
  (data.achievements||[]).forEach(function(a){
    var s = byId[a.student_id]; if(!s) return;
    s.achievements.push({title:a.title, desc:a.desc, date:a.date, created:a.created, reactions:{}, myReactions:[]});
  });
  Object.keys(byId).forEach(function(id){
    byId[id].achievements.sort(function(a,b){return String(a.created||'').localeCompare(String(b.created||''));});
  });
  (data.reactions||[]).forEach(function(r){
    var s = byId[r.student_id]; if(!s) return;
    var ach = s.achievements[Number(r.achievement_idx)]; if(!ach) return;
    ach.reactions[r.emoji] = (ach.reactions[r.emoji]||0) + 1;
    if(currentUserId && r.reactor_id === currentUserId){
      ach.myReactions.push(r.reactor_id + r.emoji);
    }
  });
  return Object.keys(byId).map(function(id){return byId[id];});
}

function reloadFromServer(){
  return apiGet().then(function(data){
    students = transformServerData(data, me ? me.id : null);
    if(me){ me = students.find(function(s){return s.id===me.id;}) || me; }
    if(viewing){ viewing = students.find(function(s){return s.id===viewing.id;}) || viewing; }
    saveData();
  });
}

// ══════════════════════════════════════
// DATOS
// ══════════════════════════════════════
var STORAGE_KEY = 'amt_v1';

var SEED = [
  {id:'andy',  name:'Andy Montes', niche:'Estrategia de datos · IA', color:'#FF1493', pin:'1111', bio:'Retail & Consumer Behavior Specialist. Consultora, docente y próxima speaker.', weeks:{}, projects:[], achievements:[]},
  {id:'claire',name:'Claire',      niche:'UX Estratégica · Flex',    color:'#00B8C4', pin:'5555', bio:'Completa tu perfil cuando entres.', weeks:{}, projects:[], achievements:[]},
  {id:'erika', name:'Erika',       niche:'Educación matemática',     color:'#FFD60A', pin:'3333', bio:'Completa tu perfil cuando entres.', weeks:{}, projects:[], achievements:[]},
  {id:'carla', name:'Carla',       niche:'Psicología adolescente',   color:'#BF00FF', pin:'2222', bio:'Completa tu perfil cuando entres.', weeks:{}, projects:[], achievements:[]},
  {id:'antonio',name:'Antonio',    niche:'Facilitador · Estrategia', color:'#A8FF00', pin:'4444', bio:'Completa tu perfil cuando entres.', weeks:{}, projects:[], achievements:[]}
];

var EMOJIS = ['🔥','💪','🎉','⭐','👏'];

var PROJ_STATUS = {
  activo:  {label:'Activo',   color:'#A8FF00'},
  pausado: {label:'Pausado',  color:'#FFD60A'},
  listo:   {label:'Listo ✓', color:'#FF1493'}
};

// ── PLANTA: últimas 4 semanas ──
var PLANTS = [
  {emoji:'🌱', label:'Semilla',    min:0},
  {emoji:'🪴', label:'Brote',      min:1},
  {emoji:'🌿', label:'Creciendo',  min:2},
  {emoji:'🌳', label:'Establecida',min:3},
  {emoji:'🌺', label:'Floreciendo',min:4}
];

function _fmtYMD(dt){
  var y = dt.getFullYear();
  var m = String(dt.getMonth()+1).padStart(2,'0');
  var d = String(dt.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}
function getMonday(d){
  var dt = d ? new Date(d+'T12:00:00') : new Date();
  var day = dt.getDay();
  dt.setDate(dt.getDate() - (day===0?6:day-1));
  return _fmtYMD(dt);
}
function currentWeek(){ return getMonday(); }

function getPlant(s){
  var wkey = currentWeek();
  var weeks = s.weeks || {};
  var active = 0;
  // revisar últimas 4 semanas
  for(var i=0; i<4; i++){
    var d = new Date(wkey+'T12:00:00');
    d.setDate(d.getDate() - i*7);
    var k = getMonday(_fmtYMD(d));
    var w = weeks[k];
    if(w && w.goals && w.goals.some(function(g){return g.done;})) active++;
  }
  // bonus: si tiene logros también
  var bonus = (s.achievements||[]).length > 0 && active >= 4 ? 1 : 0;
  var score = Math.min(active + bonus, 4);
  return PLANTS[score];
}

// ── STORAGE ──
function loadData(){
  try{
    var r = localStorage.getItem(STORAGE_KEY);
    if(r){
      var d = JSON.parse(r);
      if(d && d.students && d.students.length){
        // migrar: agregar campos faltantes
        d.students = d.students.map(function(s){
          return Object.assign({weeks:{},projects:[],achievements:[]}, s);
        });
        return d.students;
      }
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function saveData(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({students:students})); }catch(e){} }

// ── ESTADO ──
var students = loadData();
var me = null, viewing = null, screen = 'ov', tab = 'week', viewingWeek = null;
var pinTarget = null, isDark = false;

function ini(n){ return (n||'?').split(' ').slice(0,2).map(function(w){return w[0];}).join('').toUpperCase(); }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function getViewing(){ return students.find(function(s){return s.id===viewing.id;})||viewing; }

function celebratePlants(){
  var plants = document.querySelectorAll('.plant-emoji');
  plants.forEach(function(el){
    el.classList.remove('celebrate');
    void el.offsetWidth;
    el.classList.add('celebrate');
    setTimeout(function(){ el.classList.remove('celebrate'); }, 750);
  });
}

var _notifTimer = null;
function notify(msg, type){
  type = type || 'success';
  var n = document.getElementById('notif');
  var spin = type === 'loading' ? '<span class="spinner"></span>' : '';
  n.className = 'notif ' + type + ' show';
  n.innerHTML = spin + '<span>' + msg + '</span>';
  clearTimeout(_notifTimer);
  // loading no auto-dismiss; queda hasta que llegue success/error
  if(type !== 'loading'){
    _notifTimer = setTimeout(function(){ n.classList.remove('show'); }, type==='error' ? 4000 : 2400);
  }
}
function notifyClear(){
  var n = document.getElementById('notif');
  clearTimeout(_notifTimer);
  n.classList.remove('show');
}

function updateMe(fn){
  students = students.map(function(s){
    if(s.id !== me.id) return s;
    return Object.assign({}, s, fn(Object.assign({}, s)));
  });
  viewing = getViewing();
  saveData();
  renderSidebar();
  renderMain();
}

// ── TEMA ──
function toggleTheme(){
  isDark = !isDark;
  document.body.className = isDark ? 'dark' : 'light';
  syncThemeUI();
}
function syncThemeUI(){
  var i1=document.getElementById('themeIcon'), l1=document.getElementById('themeLabel');
  var i2=document.getElementById('themeIcon2');
  var ico = isDark ? '☀️' : '🌙';
  var lbl = isDark ? 'Cambiar a claro' : 'Cambiar a oscuro';
  if(i1){i1.textContent=ico; l1.textContent=lbl;}
  if(i2) i2.textContent=ico;
}

// ── NAVEGACIÓN ──
function goSelect(){
  document.getElementById('scApp').classList.remove('on');

  document.getElementById('scSelect').classList.add('on');
  document.getElementById('scSelect').style.display='flex';
}
function goApp(){

  document.getElementById('scApp').classList.add('on');

// ── SELECCIÓN ──
function renderSelect(){
  var g = document.getElementById('profGrid');
  g.innerHTML = students.map(function(s){
    var plant = getPlant(s);
    return '<button class="pb" onclick="clickProfile(\''+s.id+'\')">'
      +'<div class="pav" style="background:'+s.color+'cc">'+ini(s.name)+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="pnm">'+s.name+'</div>'
      +'<div class="pni">'+s.niche+'</div>'

      +'<div class="plant-wrap"><div class="plant-emoji">'+plant.emoji+'</div><div class="plant-label">'+plant.label+'</div></div>'
      +'</button>';

}

function clickProfile(id){
  pinTarget = id;
  document.getElementById('pinInp').value = '';
  document.getElementById('pinErr').style.display = 'none';
  document.getElementById('pinOv').classList.add('on');
  setTimeout(function(){document.getElementById('pinInp').focus();}, 100);
}
function closePinModal(){ document.getElementById('pinOv').classList.remove('on'); pinTarget=null; }
function submitPin(){
  var v = document.getElementById('pinInp').value.trim();
  var s = students.find(function(x){return x.id===pinTarget;});
  if(!s) return;
  apiPost('verifyPin', {student_id: s.id, pin: v}).then(function(){
    myPin = v;
    me = s; viewing = s; closePinModal();
    // Recargar para traer reacciones del usuario actual marcadas correctamente
    reloadFromServer().catch(function(){}).then(function(){
      var av = document.getElementById('hdrAv');
      av.textContent = ini(me.name); av.style.background = me.color+'cc';
      document.getElementById('hdrNom').textContent = me.name.split(' ')[0];
      screen='ov'; tab='week'; viewingWeek=null;
      goApp(); renderSidebar(); showOv();
      maybeAutoTour();
    });
  }).catch(function(){
    document.getElementById('pinErr').style.display = 'block';
    document.getElementById('pinInp').value = '';
    document.getElementById('pinInp').focus();
  });
}
document.getElementById('pinInp').addEventListener('keydown', function(e){ if(e.key==='Enter') submitPin(); });

// ── SIDEBAR ──
function renderSidebar(){
  var html = students.map(function(s){
    var plant = getPlant(s);
    var on = (viewing && viewing.id===s.id && screen==='stu') ? ' on' : '';
    return '<div class="si'+on+'" onclick="clickStudent(\''+s.id+'\')">'
      +'<div class="sav" style="background:'+s.color+'cc">'+ini(s.name)+'</div>'
      +'<div style="flex:1;min-width:0"><div class="snm">'+s.name.split(' ')[0]+'</div>'
      +'<div class="sni">'+s.niche+'</div></div>'
      +'<div style="font-size:18px;flex-shrink:0">'+plant.emoji+'</div>'
      +'</div>';
  }).join('');
  document.getElementById('sbList').innerHTML = html;
  document.getElementById('navOv').className = 'snav'+(screen==='ov'?' on':'');
  document.getElementById('navWall').className = 'snav'+(screen==='wall'?' on':'');

  // móvil
  var mp = document.getElementById('mobPeople');
  if(mp) mp.innerHTML = students.map(function(s){
    var plant = getPlant(s);
    var on = (viewing && viewing.id===s.id && screen==='stu') ? ' on' : '';
    return '<div class="si'+on+'" onclick="clickStudent(\''+s.id+'\');closePeople()">'
      +'<div class="sav" style="background:'+s.color+'cc">'+ini(s.name)+'</div>'
      +'<div style="flex:1;min-width:0"><div class="snm">'+s.name.split(' ')[0]+'</div>'
      +'<div class="sni">'+s.niche+'</div></div>'
      +'<div style="font-size:18px;flex-shrink:0">'+plant.emoji+'</div>'
      +'</div>';
  }).join('');

  var mnOv = document.getElementById('mnOv');
  var mnWall = document.getElementById('mnWall');
  var mnPpl = document.getElementById('mnPpl');
  if(mnOv) mnOv.className = 'mnb'+(screen==='ov'?' on':'');
  if(mnWall) mnWall.className = 'mnb'+(screen==='wall'?' on':'');
  if(mnPpl) mnPpl.className = 'mnb'+(screen==='stu'?' on':'');
}

function clickStudent(id){
  var s = students.find(function(x){return x.id===id;});
  if(s){ viewing=s; screen='stu'; tab='week'; viewingWeek=null; renderSidebar(); renderMain(); }
}
function showOv(){ screen='ov'; renderSidebar(); renderMain(); }
function showWall(){ screen='wall'; renderSidebar(); renderMain(); }
function renderMain(){
  if(screen==='ov') renderOverview();
  else if(screen==='wall') renderWall();
  else renderProfile();
}

// ── OVERVIEW ──
function renderOverview(){
  var wkey = currentWeek();
  var d = new Date(wkey+'T12:00:00');
  var d2 = new Date(d); d2.setDate(d.getDate()+6);
  var MES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var wlabel = 'Semana del '+d.getDate()+' '+MES[d.getMonth()]+' al '+d2.getDate()+' '+MES[d2.getMonth()];

  var cards = students.map(function(s){
    var w = (s.weeks||{})[wkey] || {goals:[]};
    var goals = w.goals || [];
    var done = goals.filter(function(g){return g.done;}).length;
    var pct = goals.length ? Math.round(done/goals.length*100) : 0;
    var plant = getPlant(s);

    var goalsHtml = goals.length
      ? goals.map(function(g){
          var c = s.color;
          return '<div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">'
            +'<div style="width:18px;height:18px;border-radius:3px;border:2px solid '+(g.done?c:'var(--border2)')+';background:'+(g.done?c+'22':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+c+';flex-shrink:0;margin-top:2px">'+(g.done?'✓':'')+'</div>'
            +'<div style="font-size:14px;font-weight:500;text-decoration:'+(g.done?'line-through':'none')+';color:'+(g.done?'var(--text2)':'var(--text)')+'">'+g.title+'</div>'
            +'</div>';
        }).join('')
      : '<div style="font-size:13px;color:var(--text2);font-style:italic;padding:4px 0">Sin compromisos esta semana</div>';

    return '<div class="ov-card" onclick="clickStudent(\''+s.id+'\')" style="border-top:3px solid '+s.color+'">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'
      +'<div style="width:40px;height:40px;border-radius:6px;background:'+s.color+'cc;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0">'+ini(s.name)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:16px;font-weight:700">'+s.name.split(' ')[0]+'</div>'
      +'<div style="font-size:12px;color:var(--text2)">'+s.niche+'</div></div>'
      +'<div class="plant-wrap"><div class="plant-emoji">'+plant.emoji+'</div><div class="plant-label">'+plant.label+'</div></div>'
      +'</div>'
      +goalsHtml
      +(goals.length?'<div class="prog-bg" style="margin-top:10px"><div class="prog-fill" style="width:'+pct+'%;background:'+s.color+'"></div></div>'
        +'<div style="font-size:12px;color:var(--text2);margin-top:4px;font-weight:700">'+done+' de '+goals.length+' compromisos</div>'
      :'')
      +'</div>';
  }).join('');

  document.getElementById('mainArea').innerHTML =
    '<div style="margin-bottom:22px"><div class="eyebrow">Vista de reunión</div>'
    +'<div class="sech1">'+wlabel+'</div></div>'
    +'<div class="ov-grid">'+cards+'</div>';
}

// ── MURO DE LOGROS ──
function renderWall(){
  var all = [];
  students.forEach(function(s){
    (s.achievements||[]).forEach(function(a,i){ all.push({s:s,a:a,i:i}); });
  });
  all.sort(function(a,b){ return (b.a.created||'').localeCompare(a.a.created||''); });

  var html = '<div style="margin-bottom:22px"><div class="eyebrow">El grupo</div>'
    +'<div class="sech1">Logros 🏆</div>'
    +'<div class="help" style="margin-top:14px">Lo que el grupo ha logrado. <strong>Reacciona</strong> para celebrar a tus compañeras.</div></div>';

  if(!all.length){
    html += '<div class="empty-state"><div class="empty-icon">🏆</div>'
      +'<h4>Sin logros todavía</h4>'
      +'<p>Entra a tu perfil y registra tu primer logro. Por pequeño que sea.</p></div>';
    document.getElementById('mainArea').innerHTML = html;
    return;
  }

  html += '<div class="grid2">';
  all.forEach(function(item){
    var s=item.s, a=item.a, i=item.i;
    var reactions = a.reactions||{};
    var btns = EMOJIS.map(function(e){
      var cnt = reactions[e]||0;
      var myR = a.myReactions||[];
      var on = (me && myR.indexOf(me.id+e)>=0) ? ' on' : '';
      return '<button class="react-btn'+on+'" onclick="addReaction(\''+s.id+'\','+i+',\''+e+'\')">'
        +e+'<span class="react-count">'+(cnt>0?cnt:'')+'</span></button>';
    }).join('');

    html += '<div class="card">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
      +'<div style="width:36px;height:36px;border-radius:6px;background:'+s.color+'cc;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0">'+ini(s.name)+'</div>'
      +'<div><div style="font-size:14px;font-weight:700">'+s.name.split(' ')[0]+'</div>'
      +'<div style="font-size:12px;color:var(--text2)">'+a.date+'</div></div>'
      +'</div>'
      +'<div style="font-size:17px;font-weight:700;margin-bottom:6px;line-height:1.3">🏆 '+a.title+'</div>'
      +(a.desc?'<div style="font-size:14px;color:var(--text3);line-height:1.5;margin-bottom:10px">'+a.desc+'</div>':'')
      +'<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:8px">'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'+btns+'</div>'
      +(me&&me.id===s.id?'<button class="bd" onclick="deleteAchWall(\''+s.id+'\','+i+')">Borrar</button>':'')
      +'</div></div>';
  });
  html += '</div>';
  document.getElementById('mainArea').innerHTML = html;
}

function addReaction(sid, idx, emoji){
  if(!me){ notify('Entra con tu perfil para reaccionar.'); return; }
  var owner = students.find(function(x){return x.id===sid;});
  if(!owner) return;
  var ach = (owner.achievements||[])[idx]; if(!ach) return;
  var key = me.id+emoji;
  var has = (ach.myReactions||[]).indexOf(key) >= 0;
  var action = has ? 'removeReaction' : 'addReaction';
  apiPost(action, {

// ── ESTA SEMANA ──
function renderWeek(sv, own){
  var wkey = viewingWeek || currentWeek();
  var isCurrent = !viewingWeek || viewingWeek===currentWeek();
  var weeks = sv.weeks||{};
  var goals = (weeks[wkey]&&weeks[wkey].goals)||[];

  // selector de semana
  var MES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  function wlabel(k){
    var d=new Date(k+'T12:00:00');
    var d2=new Date(d); d2.setDate(d.getDate()+6);
    return d.getDate()+' '+MES[d.getMonth()]+' – '+d2.getDate()+' '+MES[d2.getMonth()];
  }
  var keys = Object.keys(weeks);
  if(keys.indexOf(currentWeek())<0) keys.unshift(currentWeek());
  keys.sort(function(a,b){return b.localeCompare(a);});
  var selector = keys.length>1
    ? '<select onchange="changeWeek(this.value)" style="font-size:14px;font-weight:700;padding:10px 14px;min-height:42px;width:auto;max-width:100%;margin-bottom:18px">'
      +keys.map(function(k){return '<option value="'+k+'"'+(k===wkey?' selected':'')+'>'+wlabel(k)+(k===currentWeek()?' · Esta semana':'')+'</option>';}).join('')+'</select>'
    : '<div style="font-size:14px;font-weight:700;color:var(--text2);margin-bottom:18px">'+wlabel(wkey)+(isCurrent?' · Esta semana':'')+'</div>';

  var btn = own&&isCurrent ? '<button class="bp" onclick="openMetaModal()">+ Compromiso</button>' : '';
  var html = '<div class="sech"><div><div class="eyebrow">'+sv.name.split(' ')[0]+'</div>'
    +'<div class="sech1">Esta semana</div></div>'+btn+'</div>'
    + selector;

  if(!goals.length){
    if(own&&isCurrent) html += '<div class="help">Escribe <strong>qué vas a lograr esta semana</strong>. Al final de la semana lo revisamos juntas.</div>';
    html += '<div class="empty-state"><div class="empty-icon">🌱</div>'
      +'<h4>Sin compromisos</h4>'
      +'<p>'+(own?'Agrega tu primer compromiso arriba. Una cosa concreta.':'Aún no hay compromisos esta semana.')+'</p></div>';
    return html;
  }

  var done = goals.filter(function(g){return g.done;}).length;
  var pct = Math.round(done/goals.length*100);
  var c = sv.color;
  var glow = pct===100 ? ';box-shadow:0 0 12px '+c+'88' : '';
  html += '<div style="margin-bottom:18px">'
    +'<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:.02em"><span>Completados</span><span style="color:'+(pct===100?c:'var(--text2)')+'">'+done+' de '+goals.length+'</span></div>'
    +'<div class="prog-bg"><div class="prog-fill" style="width:'+pct+'%;background:linear-gradient(90deg,'+c+','+c+'dd)'+glow+'"></div></div>'
    +'</div>';

  html += '<div class="grid1">';
  goals.forEach(function(g,i){
    var chk = own
      ? '<div class="chk" style="border-color:'+(g.done?c:'var(--border2)')+';background:'+(g.done?c+'22':'transparent')+';color:'+c+'" onclick="toggleGoal(\''+wkey+'\','+i+')">'+(g.done?'✓':'')+'</div>'
      : '<div class="chk" style="border-color:'+(g.done?c:'var(--border2)')+';background:'+(g.done?c+'22':'transparent')+'"></div>';
    html += '<div class="row">'+chk
      +'<div style="flex:1;font-size:16px;font-weight:500;text-decoration:'+(g.done?'line-through':'none')+';color:'+(g.done?'var(--text2)':'var(--text)')+'">'+g.title+'</div>'
      +(own?'<button class="bd" onclick="deleteGoal(\''+wkey+'\','+i+')">Borrar</button>':'')
      +'</div>';
  });
  html += '</div>';
  return html;
}

function changeWeek(k){ viewingWeek = k===currentWeek()?null:k; renderProfile(); }

function _currentGoals(s, wkey){
  var w = (s.weeks||{})[wkey] || {goals:[]};
  return (w.goals||[]).slice();
}
function _syncWeekGoals(wkey, newGoals, okMsg){
  notify('Guardando...', 'loading');
  return apiPost('saveWeekGoals', {
    student_id: me.id, pin: myPin, week_key: wkey,
    goals_json: JSON.stringify(newGoals)
  }).then(function(){
    updateMe(function(s){
      var ws=Object.assign({},s.weeks||{});
      var w=Object.assign({},ws[wkey]||{review:'',created:wkey});
      w.goals = newGoals; ws[wkey]=w; return {weeks:ws};
    });
    notify(okMsg);
    return true;
  }, function(e){ notify('Error: '+e.message, 'error'); return false; });
}
function toggleGoal(wkey,i){
  var goals = _currentGoals(me, wkey);
  if(!goals[i]) return;
  var becameDone = !goals[i].done;
  goals[i] = Object.assign({}, goals[i], {done: !goals[i].done});
  _syncWeekGoals(wkey, goals, becameDone ? '¡Cumplido! 🌱' : 'Compromiso actualizado').then(function(ok){
    if(ok && becameDone) celebratePlants();
  });
}
function deleteGoal(wkey,i){
  var goals = _currentGoals(me, wkey);
  goals.splice(i,1);
  _syncWeekGoals(wkey, goals, 'Borrado.');
}

    +'<div class="ig"><label class="lbl">Repite el PIN nuevo</label>'
      +'<input type="password" inputmode="numeric" id="cpNew2" maxlength="4" placeholder="• • • •" style="text-align:center;font-size:28px;letter-spacing:10px;font-weight:700"></div>'
    +'<div id="cpErr" style="display:none;color:#ff6b6b;font-size:14px;font-weight:700;text-align:center;margin-bottom:10px"></div>'
    +'<div class="br"><button class="bs" onclick="closeModal()">Cancelar</button><button class="bp" onclick="submitChangePin()">Guardar PIN</button></div>';
  document.getElementById('genOv').classList.add('on');
  setTimeout(function(){document.getElementById('cpOld').focus();}, 100);
}

function submitChangePin(){
  var oldP = document.getElementById('cpOld').value.trim();
  var newP = document.getElementById('cpNew').value.trim();
  var newP2 = document.getElementById('cpNew2').value.trim();
  var err = document.getElementById('cpErr');
  err.style.display = 'none';

  function showErr(msg){ err.textContent = msg; err.style.display = 'block'; }

  if(oldP !== myPin){ showErr('Tu PIN actual no coincide.'); return; }
  if(!/^[0-9]{4}$/.test(newP)){ showErr('El PIN nuevo debe ser 4 números.'); return; }
  if(newP !== newP2){ showErr('Los dos PIN nuevos no coinciden.'); return; }
  if(newP === oldP){ showErr('El PIN nuevo debe ser distinto del actual.'); return; }

  apiPost('changePin', {student_id: me.id, pin: myPin, new_pin: newP}).then(function(){
    myPin = newP;
    closeModal();
    notify('🔐 PIN actualizado. No lo olvides.');
  }).catch(function(e){ showErr('Error: '+e.message); });
}

// ══════════════════════════════════════
// TOUR GUIADO
// ══════════════════════════════════════
var TOUR_KEY = 'amt_tour_seen_v1';
var DEFAULT_PINS = {andy:'1111', carla:'2222', erika:'3333', antonio:'4444', claire:'5555'};

// Cada paso opcionalmente navega a una sección y resalta un elemento (#id)
var TOUR_STEPS = [
  {emoji:'👋', title:'Hola',
    body:'Esta app es del grupo de 5. Te muestro en 1 minuto cómo se usa. Avanza con "Siguiente".',
    action: function(){ showOv(); }},
  {emoji:'⊞', title:'Vista Resumen',
    body:'Aquí ves al grupo y cómo van. Cada persona tiene una plantita que crece si cumple metas. Tú eres uno de ellos.',
    action: function(){ showOv(); }, highlight:'mainArea'},
  {emoji:'👤', title:'Tu perfil',
    body:'Ahora abrimos tu perfil. Aquí escribes lo tuyo: meta de la semana, cómo te fue, proyectos y logros.',
    action: function(){ if(me){ clickStudent(me.id); switchTab('week'); } }},
  {emoji:'📋', title:'1. Esta semana',
    body:'Anota UNA meta concreta para los próximos 7 días. Simple, que sepas si la cumpliste o no. El lunes empieza semana nueva.',
    action: function(){ switchTab('week'); }, highlight:'tabContent'},
  {emoji:'💬', title:'2. Cómo me fue',
    body:'Al final de la semana cuenta qué pasó: qué funcionó, qué no, qué aprendiste. Un diario corto.',
    action: function(){ switchTab('review'); }, highlight:'tabContent'},
  {emoji:'🚀', title:'3. Mis proyectos',
    body:'Lo que estás trabajando en general (lo que no cabe en una semana). Marca si está Activo, Pausado o Listo.',
    action: function(){ switchTab('proj'); }, highlight:'tabContent'},
  {emoji:'🏆', title:'4. Mis logros',
    body:'Cuando termines algo importante, súbelo. El grupo reacciona con 🔥💪🎉 y queda guardado.',
    action: function(){ switchTab('ach'); }, highlight:'tabContent'},
  {emoji:'👥', title:'Logros del grupo',
    body:'Aquí ves todo lo que el grupo ha logrado. Reacciona, celebra, inspírate.',
    action: function(){ showWall(); }, highlight:'mainArea'},
  {emoji:'?', title:'Si te pierdes',
    body:'Este botón rosado abajo a la derecha (?) te trae el tour de vuelta cuando quieras. En ⚙️ arriba puedes cambiar tu PIN y el tema. ¡Listo!',
    action: function(){ showOv(); }, highlight:'helpFab'}
];
var tourIdx = 0;

function startTour(){
  tourIdx = 0;
  document.getElementById('tourPanel').classList.add('on');
  renderTour();
}
function endTour(){
  document.getElementById('tourPanel').classList.remove('on');
  clearTourHighlight();
  var wasFirstTime = false;
  try{
    wasFirstTime = !localStorage.getItem(TOUR_KEY);
    localStorage.setItem(TOUR_KEY, '1');
  }catch(e){}
  if(wasFirstTime && me && DEFAULT_PINS[me.id] === myPin){
    setTimeout(openFirstPinChange, 300);
  }
}
function clearTourHighlight(){
  var prev = document.querySelectorAll('.tour-hl');
  prev.forEach(function(el){ el.classList.remove('tour-hl'); });
}

function openFirstPinChange(){
  var m = document.getElementById('genModal');
  m.innerHTML =
    '<div style="font-size:42px;text-align:center;margin-bottom:8px">🔐</div>'
    +'<div class="mt" style="text-align:center">Crea tu PIN secreto</div>'
    +'<div class="ms" style="text-align:center">Andy te dio un PIN temporal. Ahora elige uno tuyo de 4 números para que nadie más entre como tú.</div>'
    +'<div class="ig"><label class="lbl">PIN nuevo (4 números)</label>'
      +'<input type="password" inputmode="numeric" id="fpNew" maxlength="4" placeholder="• • • •" style="text-align:center;font-size:28px;letter-spacing:10px;font-weight:700"></div>'
    +'<div class="ig"><label class="lbl">Repítelo</label>'
      +'<input type="password" inputmode="numeric" id="fpNew2" maxlength="4" placeholder="• • • •" style="text-align:center;font-size:28px;letter-spacing:10px;font-weight:700"></div>'
    +'<div id="fpErr" style="display:none;color:#ff6b6b;font-size:14px;font-weight:700;text-align:center;margin-bottom:10px"></div>'
    +'<div class="br"><button class="bs" onclick="closeModal();notify(\'Ok, puedes cambiarlo desde ⚙️ cuando quieras\')">Más tarde</button><button class="bp" onclick="submitFirstPin()">Guardar PIN</button></div>';
  document.getElementById('genOv').classList.add('on');
  setTimeout(function(){document.getElementById('fpNew').focus();}, 100);
}

function submitFirstPin(){
  var newP = document.getElementById('fpNew').value.trim();
  var newP2 = document.getElementById('fpNew2').value.trim();
  var err = document.getElementById('fpErr');
  err.style.display = 'none';
  function showErr(msg){ err.textContent = msg; err.style.display = 'block'; }

  if(!/^[0-9]{4}$/.test(newP)){ showErr('Debe ser 4 números.'); return; }
  if(newP !== newP2){ showErr('Los dos PIN no coinciden.'); return; }
  if(newP === myPin){ showErr('Elige uno distinto al temporal.'); return; }

  apiPost('changePin', {student_id: me.id, pin: myPin, new_pin: newP}).then(function(){
    myPin = newP;
    closeModal();
    notify('🔐 PIN guardado. ¡Que no se te olvide!');
  }).catch(function(e){ showErr('Error: '+e.message); });
}
function tourNext(){
  if(tourIdx < TOUR_STEPS.length - 1){ tourIdx++; renderTour(); }
  else endTour();
}
function tourPrev(){
  if(tourIdx > 0){ tourIdx--; renderTour(); }
}
function renderTour(){
  var step = TOUR_STEPS[tourIdx];
  clearTourHighlight();
  if(step.action) try{ step.action(); }catch(e){}
  if(step.highlight) setTimeout(function(){
    var el = document.getElementById(step.highlight);
    if(el) el.classList.add('tour-hl');
  }, 80);

  document.getElementById('tourEmoji').textContent = step.emoji;
  document.getElementById('tourTitle').textContent = step.title;
  document.getElementById('tourBody').textContent = step.body;
  var dots = TOUR_STEPS.map(function(_,i){
    return '<div style="width:7px;height:7px;border-radius:50%;background:'+(i===tourIdx?'var(--m)':'var(--border2)')+';transition:background .2s"></div>';
  }).join('');
  document.getElementById('tourDots').innerHTML = dots;
  document.getElementById('tourPrev').style.visibility = (tourIdx===0?'hidden':'visible');
  document.getElementById('tourNext').textContent = (tourIdx === TOUR_STEPS.length - 1 ? '¡Listo! ✓' : 'Siguiente →');
}

function maybeAutoTour(){
  try{
    if(!localStorage.getItem(TOUR_KEY)) setTimeout(startTour, 350);
  }catch(e){}
}

// ── INICIO ──
// Mostrar cache primero para que la UI aparezca al tiro, luego sincronizar con servidor.
renderSelect();
notify('Cargando...', 'loading');
reloadFromServer().then(function(){
  renderSelect();
  notify('Datos actualizados ✓');
}).catch(function(e){
  notify('Sin conexión al servidor. Usando datos locales.', 'error');
  console.error(e);
});
</script>
